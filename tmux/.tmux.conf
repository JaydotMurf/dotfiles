# ══════════════════════════════════════════════════════════════
#  tmux.conf — Mischa-inspired config, Tokyo Night palette
#  Prefix: C-a  │  Plugin manager: TPM
# ══════════════════════════════════════════════════════════════

# ── Prefix ────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ───────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"

set -g mouse on
set -g history-limit 50000
set -g display-time 3000
set -g focus-events on
set -sg escape-time 0          # zero ESC delay — critical for Claude Code CLI

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Key Bindings ──────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "~/.tmux.conf reloaded"

# Splits open in current pane's directory
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"

# Move current window left / right (repeatable)
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1

# Pane navigation (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Clear screen (C-l stolen by vim-tmux-navigator)
bind C-l send-keys 'C-l'

# Session switcher — floating fzf popup
bind C-f display-popup -E -w 80% -h 50% "~/.local/bin/tmux-sessionizer"

# Synchronized panes — broadcast keystrokes to all panes in window
bind S setw synchronize-panes \; display "Sync: #{?pane_synchronized,ON,OFF}"

# ── Claude Code attention badges ──────────────────────────────
# Viewing a window acknowledges the ✅/⏳ badges set by the Claude Code
# attention hook (needs focus-events on, set above). 🔔 is left alone.
# Guarded so the config still loads on machines without the hook script.
set-hook -g pane-focus-in 'run-shell -b "bash ~/.claude/hooks/attention.sh seen \"#{hook_pane}\" 2>/dev/null || true"'

# ── Copy Mode (vi) ────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel

# ── Status Bar — Tokyo Night ──────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style                 "bg=#1a1b26,fg=#c0caf5"
set -g status-left                  "#[fg=#7aa2f7,bold] #S #[fg=#414868]│ "
set -g status-left-length           30
set -g status-right                 "#{?pane_synchronized,#[fg=#f7768e,bold] SYNC ,}#[fg=#414868]%d %b #[fg=#c0caf5,bold]%H:%M "
set -g status-right-length          25
set -g window-status-format         "#[fg=#414868] #I:#W "
set -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
set -g window-status-separator      ""
set -g pane-border-style            "fg=#414868"
set -g pane-active-border-style     "fg=#e0af68,bold"
set -g window-style                 "bg=#16161e"
set -g window-active-style          "bg=#1a1b26"
set -g message-style                "bg=#414868,fg=#c0caf5"

# ── Plugins (TPM) ─────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore             'on'
set -g @continuum-save-interval       '10'

# ── TPM Bootstrap (auto-install on first run) ──────────────────
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Keep at very bottom
run '~/.tmux/plugins/tpm/tpm'
